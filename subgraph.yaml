specVersion: 1.0.0
description: hood.dev on Robinhood Chain — locker, launchpad, and trading terminal
repository: https://hood.dev
schema:
  file: ./schema.graphql
#
# ONE subgraph for the whole platform — locker, launchpad and terminal share the
# Token and User entities, so deployer-side and trader-side data join directly.
#
# EVERY hood.dev contract is now deployed and indexed. Robinhood Chain mainnet
# (chain 4663), all deployed 2026-07-14, each data source starting at its own
# contract's deployment block:
#   * Launchpad (ignition/modules/Launchpad.ts)  — blocks 9401710..9401921 → 9401710
#   * Terminal  (ignition/modules/Terminal.ts)   — blocks 9415883..9415931 → 9415883
#   * Locker    (ignition/modules/HoodLocker.ts) — block  9423803          → 9423803
#
# When adding a data source for a NEW contract: never point it at 0x0 with
# startBlock 0 — the indexer would crawl from genesis and find nothing, wrecking
# sync time for the whole subgraph. Wait until you have a real address and its
# deployment block.
#
dataSources:
  - kind: ethereum
    name: HoodLocker
    # Goldsky's network slug for Robinhood Chain mainnet (chain ID 4663).
    network: robinhood-mainnet
    source:
      address: "0x6528F3edC098655460a6e5FF916BA6DE2e1143C3"
      abi: HoodLocker
      startBlock: 9423803
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LockerStats
        - Token
        - User
        - TokenLock
        - VestingSchedule
        - VestingClaim
      abis:
        - name: HoodLocker
          file: ./abis/HoodLocker.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: LockCreated(indexed uint256,indexed address,indexed address,address,uint256,uint64)
          handler: handleLockCreated
        - event: LockExtended(indexed uint256,uint64)
          handler: handleLockExtended
        - event: LockWithdrawn(indexed uint256,indexed address,uint256)
          handler: handleLockWithdrawn
        - event: VestingCreated(indexed uint256,indexed address,indexed address,address,uint256,uint64,uint64,uint32)
          handler: handleVestingCreated
        - event: VestingClaimed(indexed uint256,indexed address,uint256,uint256)
          handler: handleVestingClaimed
      file: ./src/locker.ts
  - kind: ethereum
    name: FeeLocker
    network: robinhood-mainnet
    source:
      address: "0x0606a93703B13A65997E439A713729c28e4bf883"
      abi: FeeLocker
      startBlock: 10718310
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - FeeLockerStats
        - LockedPosition
        - FeeCollection
        - Token
        - User
      abis:
        - name: FeeLocker
          file: ./abis/FeeLocker.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: PositionLocked(indexed uint256,indexed address,address,address,indexed address,uint16)
          handler: handlePositionLocked
        - event: FeesCollected(indexed uint256,indexed address,uint256,uint256)
          handler: handleFeesCollected
        - event: CreatorRecipientUpdated(indexed uint256,indexed address,indexed address)
          handler: handleCreatorRecipientUpdated
        - event: FeeReceiverUpdated(indexed address,indexed address)
          handler: handleFeeReceiverUpdated
      file: ./src/fee-locker.ts
  # NOTE: when a new IV3FeeReceiver policy contract is installed via
  # setFeeReceiver, add another data source block like this one for its address
  # (or convert to a template spawned from FeeReceiverUpdated).
  - kind: ethereum
    name: V3FeeReceiver
    network: robinhood-mainnet
    source:
      address: "0xCE240c61E3d5cf2b51f5d72A5efdFB23D775790C"
      abi: V3FeeReceiver
      startBlock: 10718310
    mapping:
