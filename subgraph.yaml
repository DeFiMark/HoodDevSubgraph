  # ---- Trading terminal (ignition/modules/Terminal.ts) --------------------
  # Every trade routed through the platform emits TradeExecuted here: the raw
  # material for trade history, per-user PnL (TraderPosition), per-user volume
  # and fees paid (TraderStats — the cash-back base), and platform totals.
  # Trade.dex is 0 = Uniswap V2, 1 = V3, 2 = V4; V4 needs no manifest change
  # when live V4 pools appear on Robinhood.
  - kind: ethereum
    name: V1TradeManager
    network: robinhood-mainnet
    source:
      address: "0x77E3df7F9f4fB0594d11913B372380e194f04378"
      abi: V1TradeManager
      startBlock: 9415883
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TerminalStats
        - Trade
        - TraderStats
        - TraderPosition
        - Token
        - User
      abis:
        - name: V1TradeManager
          file: ./abis/V1TradeManager.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: TradeExecuted(indexed address,indexed address,indexed bool,uint8,uint256,uint256,uint256)
          handler: handleTradeExecuted
      file: ./src/trade-manager.ts
  # Cross-check on the fee side: what the receiver actually banked vs what the
  # trade manager said it charged (TerminalStats.feesReceivedEth vs feesEth).
  - kind: ethereum
    name: TradeFeeReceiver
    network: robinhood-mainnet
    source:
      address: "0x1F48551893237DC26e376121C1FCE24989A8C116"
      abi: TradeFeeReceiver
      startBlock: 9415883
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TerminalStats
      abis:
        - name: TradeFeeReceiver
          file: ./abis/TradeFeeReceiver.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: TradeFeeReceived(indexed address,indexed address,uint256)
          handler: handleTradeFeeReceived
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
      file: ./src/trade-fee-receiver.ts
  # ---- Trading terminal V2 (ignition/modules/TerminalV2.ts) ---------------
  # Supersedes V1TradeManager for new trades (multi-hop + referrals). The V1
  # data sources above stay for history. TradeExecuted gains ref + refFee —
  # `fee` is still the TOTAL platform fee, refFee the referral carve-out.
  # Deployed 2026-07-15, blocks 10297720..10297809 → startBlock 10297720.
  - kind: ethereum
    name: V2TradeManager
    network: robinhood-mainnet
    source:
      address: "0x77A2206d25c1088e1B4c9eC3E57eb90F76a696E5"
      abi: V2TradeManager
      startBlock: 10297720
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TerminalStats
        - Trade
        - TraderStats
        - TraderPosition
        - Token
        - User
      abis:
        - name: V2TradeManager
          file: ./abis/V2TradeManager.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: TradeExecuted(indexed address,indexed address,indexed bool,uint8,uint256,uint256,uint256,address,uint256)
          handler: handleTradeExecutedV2
      file: ./src/trade-manager-v2.ts
  # Fresh receiver bound to V2 (the binding is immutable); banks the PROTOCOL
  # share of the fee (total minus referral carve-out). Same ABI + handlers.
  - kind: ethereum
    name: V2TradeFeeReceiver
    network: robinhood-mainnet
    source:
      address: "0xcB597581D5c70FeC91244f49Def786D0D5360e53"
      abi: TradeFeeReceiver
      startBlock: 10297720
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TerminalStats
      abis:
        - name: TradeFeeReceiver
          file: ./abis/TradeFeeReceiver.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: TradeFeeReceived(indexed address,indexed address,uint256)
          handler: handleTradeFeeReceived
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
      file: ./src/trade-fee-receiver.ts
  # ---- Trading terminal V3 (ignition/modules/TerminalV3.ts) ---------------
  # Supersedes V2TradeManager for new trades: adds the bonding-curve venues
  # (Trade.dex 3 = FLAP_CURVE, 4 = VIRTUALS_CURVE) so launchpad tokens trade
  # BEFORE graduating to Uniswap. TradeExecuted is byte-identical to V2's, so
  # the datasource reuses the V2 ABI + handleTradeExecutedV2 (same precedent
  # as the receivers sharing the TradeFeeReceiver ABI). V2 sources stay for
  # history. ReferralManager is REUSED by V3 (no new datasource).
  # Deployed 2026-07-16, blocks 11460699..11460775 → startBlock 11460699.
  - kind: ethereum
    name: V3TradeManager
    network: robinhood-mainnet
    source:
      address: "0xA48B11D0fb7B9C0a2bB442C5e8BeeD4673d72103"
      abi: V2TradeManager
      startBlock: 11460699
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TerminalStats
        - Trade
        - TraderStats
        - TraderPosition
        - Token
        - User
      abis:
        - name: V2TradeManager
          file: ./abis/V2TradeManager.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: TradeExecuted(indexed address,indexed address,indexed bool,uint8,uint256,uint256,uint256,address,uint256)
          handler: handleTradeExecutedV2
      file: ./src/trade-manager-v2.ts
  # Fresh receiver bound to V3 (the binding is immutable). Same ABI + handlers.
  - kind: ethereum
    name: V3TradeFeeReceiver
    network: robinhood-mainnet
    source:
      address: "0x9665d420f4E03cf959472018A9A5e6f3cd89C587"
      abi: TradeFeeReceiver
      startBlock: 11460699
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TerminalStats
      abis:
        - name: TradeFeeReceiver
          file: ./abis/TradeFeeReceiver.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: TradeFeeReceived(indexed address,indexed address,uint256)
          handler: handleTradeFeeReceived
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
      file: ./src/trade-fee-receiver.ts
  # Claim-based referral accrual; builds the Referrer/Referral downline edges.
  # Shared by V2TradeManager AND V3TradeManager (both are authorized managers).
  - kind: ethereum
    name: ReferralManager
    network: robinhood-mainnet
    source:
      address: "0x2A8B1f9617336C26bD339C6b96823C5A6Bf68f5C"
      abi: ReferralManager
      startBlock: 10297720
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Referrer
        - Referral
        - ReferralEarning
        - ReferralClaim
        - Token
        - User
      abis:
        - name: ReferralManager
          file: ./abis/ReferralManager.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: ReferralAttributed(indexed address,indexed address)
          handler: handleReferralAttributed
        - event: ReferralFeeAccrued(indexed address,indexed address,indexed address,uint256)
          handler: handleReferralFeeAccrued
        - event: ReferralClaimed(indexed address,indexed address,uint256)
          handler: handleReferralClaimed
      file: ./src/referral.ts
templates:
  # Spawned per launch on the launch's canonical (LP-locked) Uniswap V3 pool;
  # keeps TokenLaunch's live price/mcap/volume/last-trade state current — the
  # landing-page board sorts on these with zero external API spend.
  - kind: ethereum/contract
    name: LaunchPool
    network: robinhood-mainnet
    source:
      abi: UniswapV3Pool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TokenLaunch
        - LaunchHourData
      abis:
        - name: UniswapV3Pool
          file: ./abis/UniswapV3Pool.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleLaunchPoolSwap
      file: ./src/launch-pool.ts
  # Spawned per launched token; keeps creator-editable metadata current.
  - kind: ethereum/contract
    name: HoodToken
    network: robinhood-mainnet
    source:
      abi: HoodToken
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TokenLaunch
      abis:
        - name: HoodToken
          file: ./abis/HoodToken.json
      eventHandlers:
        - event: ContractURIUpdated()
          handler: handleContractURIUpdated
        - event: ImageUpdated(string)
          handler: handleImageUpdated
        - event: DescriptionUpdated(string)
          handler: handleDescriptionUpdated
        - event: SocialsUpdated(string)
          handler: handleSocialsUpdated
      file: ./src/hood-token.ts
  # Spawned per staking-policy launch by StakingPoolCreated.
  - kind: ethereum/contract
    name: TokenStakingPool
    network: robinhood-mainnet
    source:
      abi: TokenStakingPool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - StakingPool
        - StakingPosition
        - StakingAction
        - User
      abis:
        - name: TokenStakingPool
          file: ./abis/TokenStakingPool.json
      eventHandlers:
        - event: Staked(indexed address,uint256,uint256,uint64)
          handler: handleStaked
        - event: Withdrawn(indexed address,uint256,uint256)
          handler: handleWithdrawn
        - event: RewardPaid(indexed address,indexed address,uint256)
          handler: handleRewardPaid
        - event: RewardAdded(indexed address,uint256,uint256)
          handler: handleRewardAdded
        - event: RewardQueued(indexed address,uint256,uint256)
          handler: handleRewardQueued
      file: ./src/staking-pool.ts
