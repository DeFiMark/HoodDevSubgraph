          handler: handleBuyBurnFeesAccrued
        - event: BuybackExecuted(indexed address,uint256,uint256,uint256,indexed address,bool)
          handler: handleBuybackExecuted
      file: ./src/buy-burn-module.ts
  - kind: ethereum
    name: BurnFeeModule
    network: robinhood-mainnet
    source:
      address: "0x45881683E01d218DD610689A5b07d3D33F3e657A"
      abi: BurnFeeModule
      startBlock: 10718310
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TokenFeePolicy
      abis:
        - name: BurnFeeModule
          file: ./abis/BurnFeeModule.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: FeesBurned(indexed address,uint256,uint256)
          handler: handleFeesBurned
      file: ./src/burn-module.ts
  - kind: ethereum
    name: VestingFeeModule
    network: robinhood-mainnet
    source:
      address: "0x1A89Dbb465F012abC20213D468D616ae0912F718"
      abi: VestingFeeModule
      startBlock: 10718310
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
