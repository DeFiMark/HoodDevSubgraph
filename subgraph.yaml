        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: TokenLaunched(indexed address,indexed address,indexed address,uint256,uint256,int24,uint16,uint16,uint32,string,string,string,uint256,uint256)
          handler: handleTokenLaunched
