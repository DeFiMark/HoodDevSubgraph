# ---------------------------------------------------------------------------
# hood.dev subgraph — Robinhood Chain (Goldsky network: robinhood-mainnet)
#
# Live today: Locker (token/LP locks + vesting schedules).
# Planned: launchpad + trading-terminal entities — see the commented section at
# the bottom; they'll share the Token and User entities below.
# ---------------------------------------------------------------------------

"Singleton (id: \"locker\") with protocol-wide counters."
type LockerStats @entity {
  id: ID!
  lockCount: Int!
  activeLockCount: Int!
  vestingCount: Int!
  claimCount: Int!
}

"Any ERC-20 touched by the platform. Shared with future launchpad entities."
type Token @entity {
  id: Bytes! # token address
  symbol: String!
  name: String!
  decimals: Int!
  "Raw units currently held in straight locks (excludes withdrawn)."
  totalLocked: BigInt!
  "Raw units still unvested/unclaimed across vesting schedules."
  totalVesting: BigInt!
  locks: [TokenLock!]! @derivedFrom(field: "token")
  vestings: [VestingSchedule!]! @derivedFrom(field: "token")
}

"Any address that has created or received a lock/vesting, or created a locked LP position."
type User @entity {
  id: Bytes! # address
  locksOwned: [TokenLock!]! @derivedFrom(field: "owner")
  locksWithdrawable: [TokenLock!]! @derivedFrom(field: "unlockerUser")
  vestingsCreated: [VestingSchedule!]! @derivedFrom(field: "creator")
  vestingsReceived: [VestingSchedule!]! @derivedFrom(field: "beneficiary")
  lockedPositions: [LockedPosition!]! @derivedFrom(field: "creator")
  launches: [TokenLaunch!]! @derivedFrom(field: "creator")
  trades: [Trade!]! @derivedFrom(field: "user")
  tradingPositions: [TraderPosition!]! @derivedFrom(field: "user")
  stakingPositions: [StakingPosition!]! @derivedFrom(field: "user")
  feeVestingsReceived: [FeeVesting!]! @derivedFrom(field: "recipient")
  "Tokens this address currently owns (canonical TokenOwnerRegistry owner)."
  tokensOwned: [TokenLaunch!]! @derivedFrom(field: "owner")
}

"A straight token/LP lock. id = on-chain lock id."
type TokenLock @entity {
  id: ID!
  token: Token!
  owner: User!
  "Sole address able to withdraw after unlock."
  unlocker: Bytes!
  unlockerUser: User!
  amount: BigInt!
  unlockTime: BigInt!
  withdrawn: Boolean!
  withdrawnAt: BigInt
  extendCount: Int!
  createdAt: BigInt!
  createdAtBlock: BigInt!
  createdTx: Bytes!
}

"A per-beneficiary vesting schedule. id = on-chain vesting id."
type VestingSchedule @entity {
  id: ID!
  token: Token!
  creator: User!
  beneficiary: User!
  total: BigInt!
  released: BigInt!
  start: BigInt!
  "Seconds."
  duration: BigInt!
  "Seconds per release step; 0 = continuous (linear)."
  interval: BigInt!
  fullyClaimed: Boolean!
  createdAt: BigInt!
  createdAtBlock: BigInt!
  createdTx: Bytes!
  claims: [VestingClaim!]! @derivedFrom(field: "schedule")
}

"One claim against a vesting schedule."
type VestingClaim @entity(immutable: true) {
  id: Bytes! # tx hash ++ log index
  schedule: VestingSchedule!
  beneficiary: Bytes!
  amount: BigInt!
  "Cumulative released after this claim."
  totalReleased: BigInt!
  timestamp: BigInt!
  tx: Bytes!
}

# ---------------------------------------------------------------------------
# FeeLocker — permanently locked launchpad V3 LP + fee capture
# ---------------------------------------------------------------------------

"Singleton (id: \"fee-locker\") with FeeLocker-wide counters."
type FeeLockerStats @entity {
  id: ID!
  positionCount: Int!
  collectCount: Int!
  "Current IV3FeeReceiver policy contract."
  feeReceiver: Bytes!
}

"""
A permanently locked V3-style LP position (Uniswap V3 or SushiSwap V3).
id = "<locker address>-<position NFT id>" — locker-scoped because each venue
has its own FeeLocker + position manager and NFT ids collide across them.
"""
type LockedPosition @entity {
  id: ID!
  "The FeeLocker holding this position (one locker per venue + the legacy v2 locker)."
  locker: Bytes!
  "The position NFT id on that locker's position manager."
  positionId: BigInt!
  pool: Bytes!
  token0: Token!
  token1: Token!
  "Current creator-fee recipient (rotatable; bps are not)."
  creator: User!
  creatorBps: Int!
  collectCount: Int!
  "Lifetime raw fees collected from the position."
  totalCollected0: BigInt!
  totalCollected1: BigInt!
  "Lifetime amounts routed to the creator / protocol by the v1 in-kind receiver."
  creatorEarned0: BigInt!
  creatorEarned1: BigInt!
  protocolEarned0: BigInt!
  protocolEarned1: BigInt!
  "Lifetime amounts delegated to the token-fee policy system (burn/vest/stake)."
  delegatedEarned0: BigInt!
  delegatedEarned1: BigInt!
  createdAt: BigInt!
  createdAtBlock: BigInt!
  createdTx: Bytes!
  collections: [FeeCollection!]! @derivedFrom(field: "position")
  distributions: [FeeDistribution!]! @derivedFrom(field: "position")
  delegations: [FeeDelegation!]! @derivedFrom(field: "position")
}

"One collect() crank on a position (raw amounts, pre-split)."
type FeeCollection @entity(immutable: true) {
  id: Bytes! # tx hash ++ log index
  position: LockedPosition!
  amount0: BigInt!
  amount1: BigInt!
  "Receiver the fees were routed through."
  receiver: Bytes!
  timestamp: BigInt!
  tx: Bytes!
}

"One per-token creator/protocol split performed by the V3FeeReceiver."
type FeeDistribution @entity(immutable: true) {
  id: Bytes! # tx hash ++ log index
  position: LockedPosition!
  token: Token!
  creator: Bytes!
  creatorAmount: BigInt!
  protocolAmount: BigInt!
  timestamp: BigInt!
  tx: Bytes!
}

"Pull-fallback balance in the V3FeeReceiver (push transfer failed)."
type ClaimableFeeBalance @entity {
  id: Bytes! # recipient ++ token
  recipient: Bytes!
  token: Token!
  amount: BigInt!
  updatedAt: BigInt!
}

"One token-side fee amount handed to the token-fee policy system."
type FeeDelegation @entity(immutable: true) {
  id: Bytes! # tx hash ++ log index
  position: LockedPosition!
  token: Token!
  "TokenFeeManager the amount was routed through."
  manager: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  tx: Bytes!
}

# ---------------------------------------------------------------------------
# TokenFeeManager + modules — per-token LP token-fee policies (burn/vest/stake)
# ---------------------------------------------------------------------------

"Module registry entry on a FeePolicyManager. id = \"token-<policyId>\" or \"creator-<policyId>\"."
type FeePolicyType @entity {
  id: ID!
  "\"token\" (token-side manager) or \"creator\" (WETH-side manager)."
  side: String!
  policyId: Int!
  "Current module for FUTURE launches; bound tokens keep their launch module."
  module: Bytes!
  "Tokens that launched with this policy id."
  tokenCount: Int!
  updatedAt: BigInt!
}

"The TOKEN-side fee policy a token bound to at launch (1=burn, 2=vesting, 3=staking). id = token address."
type TokenFeePolicy @entity {
  id: Bytes!
  token: Token!
  launch: TokenLaunch
  policyId: Int!
  module: Bytes!
  "Where fee amounts land (module for burn/vesting, the staking pool for staking)."
  venue: Bytes!
  "Module-specific config bytes passed at launch."
  configData: Bytes!
  "Lifetime token fees routed into this policy."
  totalFeesHandled: BigInt!
  handleCount: Int!
  "Lifetime fee tokens burned (burn policy only)."
  totalBurned: BigInt!
  createdAt: BigInt!
  createdAtBlock: BigInt!
  createdTx: Bytes!
}

"The CREATOR-side (WETH) fee policy a token bound to at launch (2=buy-burn, 3=staking; default reward-creator has no entity). id = token address."
type CreatorFeePolicy @entity {
  id: Bytes!
  token: Token!
  launch: TokenLaunch
  policyId: Int!
  module: Bytes!
  venue: Bytes!
  configData: Bytes!
  "Lifetime WETH routed into this policy."
  totalFeesHandled: BigInt!
  handleCount: Int!
  "Buy-burn policy: WETH waiting for the next buyback."
  pendingWeth: BigInt!
  "Buy-burn policy: lifetime WETH spent on buybacks."
  totalWethSpent: BigInt!
  "Buy-burn policy: lifetime tokens bought and burned."
  totalTokensBurned: BigInt!
  "Buy-burn policy: last buyback timestamp (initialized at launch). The trigger is PUBLIC once 90 days pass with no call — render the countdown from this."
  lastBuybackAt: BigInt!
  buybacks: [BuybackExecution!]! @derivedFrom(field: "policy")
  createdAt: BigInt!
  createdAtBlock: BigInt!
  createdTx: Bytes!
}

"One buyback: WETH in, tokens bought and burned."
type BuybackExecution @entity(immutable: true) {
  id: Bytes! # tx hash ++ log index
  policy: CreatorFeePolicy!
  token: Token!
  wethIn: BigInt!
  tokensBurned: BigInt!
  "Pending WETH remaining after this buyback."
  pendingRemaining: BigInt!
  "Who triggered it (the token owner, or anyone once public)."
  caller: Bytes!
  "True when triggered via the public 90-day path rather than by the token owner."
  isPublic: Boolean!
  timestamp: BigInt!
  tx: Bytes!
}

"Vesting-policy state for a token (VestingFeeModule). id = token address. Recipient control follows the canonical token owner (TokenLaunch.owner)."
type FeeVesting @entity {
  id: Bytes!
  policy: TokenFeePolicy!
  token: Token!
  "Payout destination of the daily release."
  recipient: User!
  "Share of the accrued balance released per daily claim."
  dailyReleaseBps: Int!
  "Fee tokens currently waiting in the vault."
  accrued: BigInt!
  "Lifetime fee tokens that entered the vault."
  totalAccrued: BigInt!
  "Lifetime paid out."
  released: BigInt!
  lastClaimAt: BigInt!
  claimCount: Int!
  claims: [FeeVestingClaim!]! @derivedFrom(field: "vesting")
  createdAt: BigInt!
}

"One daily vesting release."
type FeeVestingClaim @entity(immutable: true) {
  id: Bytes! # tx hash ++ log index
  vesting: FeeVesting!
  recipient: Bytes!
  amount: BigInt!
  "Vault balance remaining after this claim."
  remaining: BigInt!
  timestamp: BigInt!
  tx: Bytes!
}

"Per-token staking pool (StakingFeeModule clone; created when EITHER fee side picks staking). Tracks BOTH reward assets. id = pool address."
type StakingPool @entity {
  id: Bytes!
  token: Token!
  "Master copy this pool was cloned from."
  implementation: Bytes!
  totalStaked: BigInt!
  "Token rewards received while nobody was staked; released at the first stake."
  queuedRewards: BigInt!
  "WETH rewards received while nobody was staked; released at the first stake."
  queuedWethRewards: BigInt!
  "Lifetime token rewards (fees + donations) notified to the pool."
  totalRewardsAdded: BigInt!
  "Lifetime WETH rewards (creator fee share + donations) notified to the pool."
  totalWethRewardsAdded: BigInt!
  "Lifetime token rewards claimed by stakers."
  totalRewardsPaid: BigInt!
  "Lifetime WETH rewards claimed by stakers."
  totalWethRewardsPaid: BigInt!
  "Stakers with a nonzero balance right now."
  stakerCount: Int!
  depositCount: Int!
  withdrawCount: Int!
  claimCount: Int!
  positions: [StakingPosition!]! @derivedFrom(field: "pool")
  actions: [StakingAction!]! @derivedFrom(field: "pool")
  createdAt: BigInt!
  createdAtBlock: BigInt!
  createdTx: Bytes!
}

"One user's stake in a pool. id = pool ++ user."
type StakingPosition @entity {
  id: Bytes!
  pool: StakingPool!
  user: User!
  "Currently staked."
  amount: BigInt!
  "Unix seconds the current 24h deposit lock expires (0 = never deposited)."
  lockedUntil: BigInt!
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
  "Lifetime reward tokens claimed — realized profit in the staked token."
  rewardsClaimed: BigInt!
  "Lifetime WETH rewards claimed — realized profit in WETH."
  wethRewardsClaimed: BigInt!
  firstStakedAt: BigInt!
  lastActionAt: BigInt!
}

"One staking interaction (deposit / withdraw / reward claim)."
type StakingAction @entity(immutable: true) {
  id: Bytes! # tx hash ++ log index
  pool: StakingPool!
  user: User!
  "DEPOSIT | WITHDRAW | CLAIM"
  kind: String!
  "Asset moved: the staked token, or WETH for WETH-reward claims."
  asset: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  tx: Bytes!
}

# ---------------------------------------------------------------------------
# HoodLauncher — the launchpad (pool-is-the-curve; no graduation)
# ---------------------------------------------------------------------------

"Singleton (id: \"launcher\")."
type LauncherStats @entity {
  id: ID!
  launchCount: Int!
}

"One launched token. id = token address."
type TokenLaunch @entity {
  id: Bytes!
  token: Token!
  creator: User!
  """
  Launch venue, in the platform-wide V4TradeManager dexId space:
  1 = Uniswap V3, 5 = SushiSwap V3. Launcher-v2 launches (pre multi-venue)
  are all Uniswap V3 and indexed as 1.
  """
  venue: Int!
  pool: Bytes!
  positionId: BigInt!
  "The permanently locked LP position backing this token."
  position: LockedPosition
  supply: BigInt!
  "Starting tick as passed (token0-is-new-token orientation)."
  startTick: Int!
  creatorBps: Int!
  "Sniper-guard snapshot; 0/0 when the creator opted out."
  maxWalletBps: Int!
  restrictionBlocks: BigInt!
  "ERC-7572 contractURI; kept current via the HoodToken template."
  metadataURI: String!
  image: String!
  description: String!
  socials: String!
  devBuyEth: BigInt!
  devBuyTokens: BigInt!
  "Canonical token owner (TokenOwnerRegistry); zero address = renounced."
  owner: User!
  "Token-side fee policy chosen at launch; null = default in-kind split."
  feePolicy: TokenFeePolicy
  "Creator-side (WETH) fee policy; null = default reward-creator."
  creatorFeePolicy: CreatorFeePolicy

  # ---- live market state (LaunchPool template; ETH-denominated) -----------
  # Every launched token trades in ONE canonical, LP-locked V3 pool created at
  # launch, so indexing that pool's swaps captures all venues (aggregators
  # route through it). USD is display-time: multiply by the app's ETH/USD.
  "True when the launched token is token0 of the pool (token address < WETH)."
  tokenIsToken0: Boolean!
  "FDV the pool OPENED at (pre dev-buy), in ETH: 1.0001^startTick × supply."
  initialMcapEth: BigDecimal!
  "Latest pool price, ETH per whole token. Seeded from startTick at launch."
  lastPriceEth: BigDecimal!
  "lastPriceEth × supply."
  currentMcapEth: BigDecimal!
  "currentMcapEth / initialMcapEth — the growth-since-launch ranking key."
  mcapGrowth: BigDecimal!
  "Timestamp of the launch pool's last swap; 0 until the first trade."
  lastTradeAt: BigInt!

  # ---- bonding progress (derived from price; see README "Bonding") --------
  # The launch position IS a bonding curve: the entire supply, single-sided
  # over [startTick, MAX_TICK], so the WETH accumulated inside it is a closed
  # form of the current price. These fields make that legible and sortable.
  """
  ETH sitting in the launch position right now — how far the curve has filled.
  A FACT, no policy: `initialMcapEth × (√mcapGrowth − 1)`, clamped at 0.
  Falls when price falls, exactly like a pump.fun progress bar.
  """
  bondedEth: BigDecimal!
  """
  The bond goal, stamped at launch: `max(5 ETH, initialMcapEth × (√3 − 1))`.
  POLICY, not fact — the flat target keeps "bonded" comparable across tokens,
  the √3 floor stops a high-FDV launch from opening pre-bonded. Re-render from
  `bondedEth` if the constants change rather than waiting for a resync.
  """
  bondTargetEth: BigDecimal!
  "bondedEth / bondTargetEth, capped at 1. The progress bar."
  bondProgress: BigDecimal!
  "Latched: true once bondProgress first reaches 1, never false again."
  hasBonded: Boolean!
  "When it first bonded; null until then."
  bondedAt: BigInt
  "Lifetime swap totals on the launch pool."
  poolTxCount: Int!
  poolBuys: Int!
  poolSells: Int!
  "Lifetime ETH-side volume on the launch pool."
  volumeEth: BigDecimal!

  createdAt: BigInt!
  createdAtBlock: BigInt!
  createdTx: Bytes!
}

"""
Hourly trade bucket for a launch's pool — the windowed-volume source (24h
volume = sum of the last 24 buckets; only hours WITH trades exist).
id = token address ++ hour index (unix seconds / 3600, i32).
"""
type LaunchHourData @entity {
  id: Bytes!
  launch: TokenLaunch!
  "Bucket start, unix seconds (hour index × 3600)."
  hourStart: BigInt!
  "ETH-side volume inside this hour."
  volumeEth: BigDecimal!
  txCount: Int!
  buys: Int!
  sells: Int!
}

# ---------------------------------------------------------------------------
# V1TradeManager / V2TradeManager — the trading terminal (Token/ETH trades on
# Uni V2/V3/V4). Both managers feed the same entities; V2 adds referral fields.
# ---------------------------------------------------------------------------

"Singleton (id: \"terminal\")."
type TerminalStats @entity {
  id: ID!
  tradeCount: Int!
  "Sum of gross ETH sides across all trades."
  volumeEth: BigInt!
  "Platform fees taken by the trade managers (from TradeExecuted; total incl. referral carve-outs)."
  feesEth: BigInt!
  "Cross-check: fees actually received by the TradeFeeReceivers (protocol share only on V2)."
  feesReceivedEth: BigInt!
  feesWithdrawnEth: BigInt!
  "Running total carved out to referrers (V2). Cross-check vs Σ ReferralEarning.amountEth."
  referralFeesEth: BigInt!
}

"One terminal trade. The raw material for trade history and PnL."
type Trade @entity(immutable: true) {
  id: Bytes! # tx hash ++ log index
  user: User!
  token: Token!
  isBuy: Boolean!
  "0 = Uniswap V2, 1 = V3, 2 = V4."
  dex: Int!
  "Gross ETH side: buys = ETH sent in (fee included), sells = ETH out pre-fee."
  ethAmount: BigInt!
  tokenAmount: BigInt!
  "TOTAL platform fee (ETH), protocol + referral shares."
  fee: BigInt!
  "Referrer credited on this trade (V2 only; null = none)."
  referrer: Bytes
  "Referral portion of `fee` (0 on V1 trades / no referrer)."
  refFee: BigInt!
  timestamp: BigInt!
  block: BigInt!
  tx: Bytes!
}

"Per-user lifetime terminal aggregates. id = user address."
type TraderStats @entity {
  id: Bytes!
  user: User!
  tradeCount: Int!
  volumeEth: BigInt!
  feesPaidEth: BigInt!
  "Referral fees this trader's trades generated for their referrer(s)."
  referralFeesGeneratedEth: BigInt!
  firstTradeAt: BigInt!
  lastTradeAt: BigInt!
}

"Per-user-per-token aggregates — the PnL building block. id = user ++ token."
type TraderPosition @entity {
  id: Bytes!
  user: User!
  token: Token!
  tradeCount: Int!
  buyCount: Int!
  sellCount: Int!
  tokensBought: BigInt!
  tokensSold: BigInt!
  "ETH spent on buys, gross (the fee is a real cost)."
  ethSpent: BigInt!
  "ETH received from sells, net of the platform fee (what the user got)."
  ethReceived: BigInt!
  feesPaidEth: BigInt!
  lastTradeAt: BigInt!
}

# ---------------------------------------------------------------------------
# ReferralManager — claim-based referral-fee accrual (V2 terminal)
# Single-level payouts on-chain; the multi-level downline tree is reconstructed
# off-chain by traversing Referral (trader → referrer) edges.
# ---------------------------------------------------------------------------

"A referrer's lifetime + claimable referral state. id = referrer address."
type Referrer @entity {
  id: Bytes!
  user: User!
  pendingEth: BigInt!
  lifetimeEarnedEth: BigInt!
  claimedEth: BigInt!
  "Distinct traders attributed (first-touch)."
  refereeCount: Int!
  earnings: [ReferralEarning!]! @derivedFrom(field: "referrer")
  referees: [Referral!]! @derivedFrom(field: "referrer")
  claims: [ReferralClaim!]! @derivedFrom(field: "referrer")
}

"First-touch edge trader → referrer (analytics only, never payout-authoritative). id = trader address."
type Referral @entity {
  id: Bytes!
  trader: User!
  referrer: Referrer!
  attributedAt: BigInt!
}

"One referral-fee accrual (immutable). id = tx ++ logIndex."
type ReferralEarning @entity(immutable: true) {
  id: Bytes!
  referrer: Referrer!
  trader: User!
  token: Token!
  amountEth: BigInt!
  timestamp: BigInt!
  tx: Bytes!
}

"One claim (immutable). id = tx ++ logIndex."
type ReferralClaim @entity(immutable: true) {
  id: Bytes!
  referrer: Referrer!
  to: Bytes!
  amountEth: BigInt!
  timestamp: BigInt!
  tx: Bytes!
}
